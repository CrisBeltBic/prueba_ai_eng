services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: chat_db
      POSTGRES_USER: chat_user
      POSTGRES_PASSWORD: chat_password
    ports:
      - "5432:5432"
    volumes:
      - chat_database:/var/lib/postgresql/data
      - ./postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat_user -d chat_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  chromadb:
    image: chromadb/chroma:0.5.3
    ports:
      - "8000:8000"
    volumes:
      - vector_database:/chroma/.chroma/index

  vector_store_service:
    build:
      context: vector_store_service
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    volumes:
      - raw_data:/app/data
    env_file: .env
    depends_on:
      - chromadb
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8084/health')\""]
      interval: 10s
      start_period: 30s
      retries: 5

  scraper_service:
    build:
      context: scraper_service
      dockerfile: Dockerfile
    ports:
      - "8083:8083"
    volumes:
      - raw_data:/app/data
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8083/health')\""]
      interval: 10s
      start_period: 15s
      retries: 5

  pipeline_runner:
    build:
      context: pipeline_runner
      dockerfile: Dockerfile
    env_file: .env
    depends_on:
      scraper_service:
        condition: service_healthy
      vector_store_service:
        condition: service_healthy
    restart: "no"
    profiles:
      - pipeline

  chat_service:
    build:
      context: chat_service
      dockerfile: Dockerfile
    ports:
      - "8082:8082"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8082/health')\""]
      interval: 10s
      start_period: 10s
      retries: 5

  agent_service:
    build:
      context: agent_service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file: .env
    depends_on:
      chat_service:
        condition: service_healthy
      vector_store_service:
        condition: service_started
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 10s
      start_period: 15s
      retries: 5

  frontend_service:
    build:
      context: frontend_service
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    env_file: .env
    depends_on:
      agent_service:
        condition: service_healthy
      chat_service:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')\""]
      interval: 10s
      start_period: 15s
      retries: 3

volumes:
  vector_database:
  chat_database:
  raw_data:
