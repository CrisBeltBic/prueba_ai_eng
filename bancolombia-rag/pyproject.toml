[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501", "B008"]

[tool.ruff.lint.isort]
known-first-party = [
    "agent", "api_client", "chat", "store", "scraper", "config",
    "helpers", "schemas", "knowledge_server", "db",
]
known-third-party = [
    "fastapi", "groq", "httpx", "yaml", "streamlit",
    "asyncpg", "chromadb", "sentence_transformers", "pydantic", "uvicorn",
]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = [
    "vector_store_service/src/tests",
    "chat_service/src/tests",
    "agent_service/src/tests",
]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
