[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.12"
strict = true
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = [
    "vector_store_service/src/tests",
    "chat_service/src/tests",
    "agent_service/src/tests",
]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
